parameters:
  - name: Toolchain
    type: string
    # Expected values: 'stable', 'nightly', 'msrv', 'active' or a specific toolchain version
    # 'msrv' will read the MSRV from azure_core
    # 'active' will use the active toolchain for the working directory, which may come from
    #   a rustup directory override, rust-toolchain.toml, or the rustup default toolchain
    default: active
  - name: MaxAttempts
    type: number
    default: 3
  - name: WorkingDirectory
    type: string
    default: $(System.DefaultWorkingDirectory)
  - name: SetDefault
    type: boolean
    # When true, Use-Rust.ps1 sets a rustup directory override for WorkingDirectory.
    default: true

steps:
- task: PowerShell@2
  displayName: "Use Rust ${{ parameters.Toolchain }}"
  inputs:
    pwsh: true
    filePath: $(Build.SourcesDirectory)/eng/scripts/Use-Rust.ps1
    arguments: >
      -Toolchain '${{ parameters.Toolchain }}'
      -MaxAttempts ${{ parameters.MaxAttempts }}
      -SetDefault $${{ parameters.SetDefault }}
      -OutsideDirectory '$(Pipeline.Workspace)'
    workingDirectory: ${{ parameters.WorkingDirectory }}
